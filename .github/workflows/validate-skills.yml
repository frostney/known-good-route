name: Validate skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Validator freshness policy: skills-ref is installed unpinned so CI always
      # validates against the latest published Agent Skills spec implementation.
      # Caching ~/.cache/pip does not freeze the version — pip still resolves the
      # newest release from the index on every run and only reuses a cached wheel
      # when that exact version was already downloaded.
      - name: Cache pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-skills-ref

      - name: Install skills-ref
        run: pip install --upgrade skills-ref

      - name: Validate every skill against the Agent Skills spec
        run: |
          set -uo pipefail
          status=0
          found=0
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              found=1
              echo "::group::Validating ${dir%/}"
              if agentskills validate "${dir%/}"; then
                echo "OK: ${dir%/}"
              else
                echo "::error file=${dir}SKILL.md::Skill ${dir%/} failed validation"
                status=1
              fi
              echo "::endgroup::"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No skill directories (containing SKILL.md) were found"
            exit 1
          fi
          exit $status
